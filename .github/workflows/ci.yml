name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Security compliance gate
        run: npm run compliance:security

      # Informational only: the i18n hardcoded-string budget currently has a
      # few files over budget, so this is allowed to fail without blocking the
      # PR. Remove continue-on-error once the budgets are cleared.
      - name: i18n lint (non-blocking)
        run: npm run lint:i18n
        continue-on-error: true
